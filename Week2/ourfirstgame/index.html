<!--declare what type of page this is-->
<!DOCTYPE html>

<!--where html starts and ends-->

<html>

<head>
    <title>MY FIRST WEBSITE</title>
</head>

<!--html pages are made of elements-->
<!--elements have three parts, a tag that describes the elements, the content/what's being rendered by the browser and the attributes-->

<body style="background-color: rgb(216, 189, 255); color: white; font-family: monospace">

    <!--H1 through H6 are Section Titles-->

    <h1 style="color: rgb(173, 0, 72); text-align: center; font-family: monospace;">Strawberry Shortcake THE GAME</h1>
    <!--IMG element renders an image-->

    <img src="./assets/strawberry-shortcake.jpg" aria-label="an image of pallet town from pokemon"
        style="width: 100%"></img>

    <button class="start-button" style="width: 100%">
        <h1 style="text-align: center;"><a style="color: rgb(173, 0, 72);"  href="./game.html">START</a></h1>
    </button>

    <!--LISTS: ordered list (where the steps count; 1,2,3,4) and unordered lists (lists where order doesn't matter;  * , * )-->

    <section id="credits">
        <h2 style="text-align: center">Credits</h2>
        <ol>
            <li style="color: rgb(173, 0, 72);">CARTOON VIBE <a
                    href="https://cartoonvibe.com/strawberry-shortcake-characters/"></a></li>
        </ol>
    </section>

    <h3 style="color: white; text-align: center; font-family: monospace;">COPYRIGHT: Strawberry Shortcake is owned by
        WildBrain and
        this page is created as a fanwork</h3>

</body>

</html>
